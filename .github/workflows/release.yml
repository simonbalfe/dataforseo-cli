name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            os_name: Darwin
            arch_name: arm64
          - goos: darwin
            goarch: amd64
            os_name: Darwin
            arch_name: x86_64
          - goos: linux
            goarch: arm64
            os_name: Linux
            arch_name: arm64
          - goos: linux
            goarch: amd64
            os_name: Linux
            arch_name: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/dfs .
          tar -C dist -czf "dfs_${{ matrix.os_name }}_${{ matrix.arch_name }}.tar.gz" dfs
      - uses: softprops/action-gh-release@v2
        with:
          files: dfs_*.tar.gz
          generate_release_notes: true
